name: DevSecOps CI/CD Pipeline

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  code_quality:
    name: 📊 Code Quality Check (SonarQube)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up JDK 17
        uses: actions/setup-java@v3
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Verify Java Version
        run: java -version

      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 18

      - name: Verify Node.js Installation
        run: |
          node -v
          npm -v

      - name: Install SonarQube Scanner
        run: |
          curl -sSLo sonar-scanner.zip https://binaries.sonarsource.com/Distribution/sonar-scanner-cli/sonar-scanner-cli-5.0.1.3006-linux.zip
          unzip sonar-scanner.zip
          mv sonar-scanner-5.0.1.3006-linux sonar-scanner
          echo "$(pwd)/sonar-scanner/bin" >> $GITHUB_PATH
          echo "SONAR_SCANNER_OPTS=-Djava.home=$(dirname $(dirname $(which java)))" >> $GITHUB_ENV
          chmod +x sonar-scanner/bin/sonar-scanner
          export PATH="$(pwd)/sonar-scanner/bin:$PATH"

      - name: Verify SonarQube Installation
        run: |
          echo "Checking SonarScanner path..."
          which sonar-scanner
          echo "SonarScanner version:"
          sonar-scanner --version

      - name: Check SONAR_TOKEN
        run: echo "Checking if SONAR_TOKEN is set..."
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

      - name: Check coverage file
        run: ls -l coverage/lcov.info

      - name: Clear node_modules
        run: rm -rf node_modules

      - name: Run SonarQube Scan with debug logs
        run: |
          sonar-scanner -X \
            -Dsonar.projectKey=stutig123_petshop-devsecops \
            -Dsonar.organization=stutig123 \
            -Dsonar.host.url=https://sonarcloud.io \
            -Dsonar.sources=. \
            -Dsonar.language=js \
            -Dsonar.exclusions=node_modules/**,dist/** \
            -Dsonar.javascript.lcov.reportPaths=coverage/lcov.info \
            -Dsonar.nodejs.executable=$(which node)
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}